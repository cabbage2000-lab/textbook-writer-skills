name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要（重新）创建 Release 的 tag，例如 v0.1.0'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: 解析 tag
        id: vars
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="${{ github.ref_name }}"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      # 不指定 ref：push tag 时默认 checkout 该 tag 本身；workflow_dispatch 时默认 checkout
      # 主分支。后者是有意的——回填历史 tag（如早于本脚本存在的 v0.1.0）需要主分支上
      # 现存的 scripts/，CHANGELOG 的历史版本段落是累积保留的，从主分支读取内容不变。
      # 不要把 ref 改回 ${{ steps.vars.outputs.tag }}，那样会导致历史 tag 回填必现
      # "No such file or directory"（已实测触发过一次，见 commit f9da55c）。
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 结构校验（不通过则不发布 Release）
        run: python3 scripts/validate_skills.py
      - name: 提取 CHANGELOG 对应版本段
        run: python3 scripts/extract_changelog_notes.py "${{ steps.vars.outputs.version }}" > /tmp/release-notes.md
      - name: 创建或更新 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "${{ github.repository }}" --title "$TAG" --notes-file /tmp/release-notes.md
          else
            gh release create "$TAG" --repo "${{ github.repository }}" --title "$TAG" --notes-file /tmp/release-notes.md --verify-tag
          fi
